<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chernobyl</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☢️</text></svg>">
  </head>
  <body>
    <main>

      <div>
        <span>VERLAAT NU DE WEBSITE</span>
        <span>Oopsie Whoopsie, er gaat iets mis!</span>
      </div>

      <div aria-label="Camera feeds">
        <figure>
          <img src="assets/chernobyl-tour.jpg" alt="Chernobyl Tour" />
        </figure>

        <figure>
          <img src="assets/reactor.avif" alt="Reactor Core" />
        </figure>

        <figure>
          <img src="assets/water.png" alt="Cooling Water" />
        </figure>
      </div>

      <fieldset>
        <div>
          <progress value="50" max="100"></progress>
        </div>

        <div>
          <progress value="50" max="100"></progress>
        </div>

        <div>
          <progress value="50" max="100"></progress>
        </div>

        <div>
          <progress value="50" max="100"></progress>
        </div>
      </fieldset>

      <fieldset>
        <input type="checkbox" />
      </fieldset>

      <fieldset>
        <input name="slider-een" type="range" min="0" max="100" value="50" />
        <input name="slider-twee" type="range" min="0" max="100" value="75" />
        <input name="slider-drie" type="range" min="1" max="10" value="3" />
        <input name="slider-vier" type="range" min="0" max="100" value="60" />
      </fieldset>
    </main>

    <footer></footer>
    <script src="script.js"></script>
  </body>
</html>
